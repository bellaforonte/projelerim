<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Arka plan -->
  <rect width="512" height="512" rx="100" fill="#1a1d27"/>

  <!-- Şaşırmış surat -->
  <circle cx="256" cy="210" r="140" fill="#f9c74f"/>

  <!-- Gözler (şaşırmış - büyük) -->
  <circle cx="200" cy="180" r="35" fill="white"/>
  <circle cx="312" cy="180" r="35" fill="white"/>
  <circle cx="205" cy="183" r="18" fill="#1a1d27"/>
  <circle cx="317" cy="183" r="18" fill="#1a1d27"/>
  <!-- Göz parlaması -->
  <circle cx="214" cy="174" r="6" fill="white"/>
  <circle cx="326" cy="174" r="6" fill="white"/>

  <!-- Şaşırmış kaşlar -->
  <path d="M170 135 Q200 110 230 130" stroke="#1a1d27" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M282 130 Q312 110 342 135" stroke="#1a1d27" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Açık ağız (O şeklinde) -->
  <ellipse cx="256" cy="270" rx="45" ry="55" fill="#1a1d27"/>
  <ellipse cx="256" cy="268" rx="35" ry="42" fill="#c0392b"/>
  <ellipse cx="256" cy="290" rx="28" ry="18" fill="#922b21"/>

  <!-- Kırmızı yanaklar -->
  <circle cx="160" cy="245" r="28" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="352" cy="245" r="28" fill="#ff6b6b" opacity="0.5"/>

  <!-- ABOO yazısı -->
  <text x="256" y="415" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#6c63ff" text-anchor="middle" letter-spacing="4">ABOO!</text>

  <!-- Yıldızlar (şaşkınlık efekti) -->
  <text x="90" y="120" font-size="48" text-anchor="middle">✨</text>
  <text x="422" y="120" font-size="48" text-anchor="middle">✨</text>
  <text x="256" y="70" font-size="40" text-anchor="middle">💸</text>
</svg>
